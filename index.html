<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TX MD5 TOOL | MAX789</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      -webkit-overflow-scrolling: none;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    /* GAME FULL */
    .game-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      border: none;
      z-index: 1;
    }

    /* OVERLAY CHỐNG ZOOM */
    .zoom-guard {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* NÚT BẬT/TẮT TOOL */
    .toggle-btn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      z-index: 10000;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.8);
      color: #00ff41;
      font-weight: bold;
      font-size: 1rem;
      border: 1.5px solid #00ff41;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0, 255, 65, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      transition: all 0.25s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .toggle-btn:hover {
      box-shadow: 0 0 22px #00ff41;
      background: rgba(0, 20, 0, 0.9);
    }

    .toggle-btn.on {
      background: #00ff41;
      color: #000;
      box-shadow: 0 0 20px #00ff41;
    }

    /* TOOL */
    .md5-tool {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      width: 210px;
      background: rgba(0, 4, 0, 0.97);
      border: 1px solid #00ff41;
      border-radius: 7px;
      box-shadow: 0 0 22px rgba(0, 255, 65, 0.3);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      color: #00ff41;
      display: none;
      font-size: 0.58rem;
      transition: opacity 0.2s;
    }

    .md5-tool.visible {
      display: block;
    }

    /* THANH KÉO */
    .drag-bar {
      background: rgba(0, 0, 0, 0.9);
      padding: 6px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: grab;
      border-bottom: 1px solid #00ff41;
      font-size: 0.6rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 0 0 5px #00ff41;
      border-radius: 7px 7px 0 0;
      touch-action: none;
    }

    .drag-bar:active {
      cursor: grabbing;
    }

    .drag-btns {
      display: flex;
      gap: 3px;
    }

    .d-btn {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      border: 1px solid #00ff41;
      background: transparent;
      color: #00ff41;
      cursor: pointer;
      font-size: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      transition: 0.15s;
    }

    .d-btn:hover {
      background: #00ff41;
      color: #000;
    }

    .d-btn.close-btn {
      border-color: #ff0040;
      color: #ff0040;
    }

    .d-btn.close-btn:hover {
      background: #ff0040;
      color: #000;
    }

    /* NỘI DUNG */
    .tool-body {
      padding: 7px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .hash-wrapper {
      position: relative;
      width: 100%;
    }

    .hash-input {
      width: 100%;
      padding: 5px 6px;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid #00ff41;
      color: #00ff41;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.55rem;
      outline: none;
      word-break: break-all;
      min-height: 26px;
      max-height: 26px;
      line-height: 1.3;
      resize: none;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      caret-color: #00ff41;
    }

    .hash-input:focus {
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
    }

    .hash-input::placeholder {
      color: #003300;
      font-size: 0.5rem;
    }

    .btn-analyze {
      width: 100%;
      padding: 5px;
      background: #00ff41;
      color: #000;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 0.6rem;
      letter-spacing: 1px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-analyze:hover {
      box-shadow: 0 0 14px #00ff41;
    }

    .btn-analyze:active {
      transform: scale(0.96);
    }

    .btn-analyze.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .btn-analyze .loading-text {
      display: none;
    }

    .btn-analyze.loading .normal-text {
      display: none;
    }

    .btn-analyze.loading .loading-text {
      display: inline;
      animation: blink 0.6s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* PROGRESS BAR */
    .progress-wrap {
      width: 100%;
      height: 3px;
      background: rgba(0, 255, 65, 0.15);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .progress-wrap.active {
      display: block;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #00ff41;
      border-radius: 2px;
      transition: width 0.3s linear;
      box-shadow: 0 0 6px #00ff41;
    }

    /* KẾT QUẢ */
    .info-box {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 255, 65, 0.25);
      border-radius: 4px;
      padding: 5px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.55rem;
      padding: 1px 0;
    }

    .row .val {
      font-weight: bold;
      text-align: right;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 0.55rem;
      letter-spacing: 1px;
      animation: glowPulse 1.5s infinite;
    }

    @keyframes glowPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.4); }
    }

    .badge-tai {
      background: #ff0040;
      color: #fff;
      box-shadow: 0 0 8px #ff0040;
    }

    .badge-xiu {
      background: #0040ff;
      color: #fff;
      box-shadow: 0 0 8px #0040ff;
    }

    .section-label {
      font-size: 0.5rem;
      text-transform: uppercase;
      opacity: 0.7;
      letter-spacing: 1.5px;
      margin-top: 1px;
    }

    hr {
      border: none;
      border-top: 1px dashed rgba(0, 255, 65, 0.2);
      margin: 2px 0;
    }

    .final-pick {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 7px;
      background: rgba(0, 255, 65, 0.04);
      border-radius: 4px;
      font-weight: bold;
      font-size: 0.55rem;
    }

    .tai-highlight {
      color: #ff0040;
      text-shadow: 0 0 6px #ff0040;
    }

    .xiu-highlight {
      color: #0040ff;
      text-shadow: 0 0 6px #0040ff;
    }

    .dim {
      opacity: 0.3;
    }

    .hidden-body {
      display: none;
    }

    /* PARTICLES KHI PHÂN TÍCH */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9998;
    }

    .particle {
      position: absolute;
      color: #00ff41;
      font-size: 0.5rem;
      animation: floatUp 1s forwards;
      opacity: 0;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(0.5); }
    }

    /* RESPONSIVE */
    @media (max-width: 400px) {
      .md5-tool {
        width: 185px;
      }
      .hash-input {
        font-size: 0.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- GAME -->
  <iframe class="game-frame" src="https://play.max789.vin" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>

  <!-- PARTICLES -->
  <div class="particles" id="particles"></div>

  <!-- NÚT BẬT/TẮT -->
  <button class="toggle-btn" id="toggleBtn" title="Bật/Tắt Tool">⬡</button>

  <!-- TOOL MD5 -->
  <div class="md5-tool" id="md5Tool">
    <div class="drag-bar" id="dragBar">
      <span>⬡ MD5 TX</span>
      <div class="drag-btns">
        <button class="d-btn" id="minBtn" title="Thu gọn">_</button>
        <button class="d-btn close-btn" id="closeBtn" title="Tắt">✕</button>
      </div>
    </div>
    <div class="tool-body" id="toolBody">
      <div class="hash-wrapper">
        <input class="hash-input" id="hashInput" placeholder="Dán MD5/SHA256..." value="d41d8cd98f00b204e9800998ecf8427e" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">
      </div>

      <button class="btn-analyze" id="analyzeBtn">
        <span class="normal-text">▶ PHÂN TÍCH</span>
        <span class="loading-text">⏳ ĐANG XỬ LÝ...</span>
      </button>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="info-box">
        <div class="row"><span>KẾT QUẢ:</span><span id="badge">--</span></div>
        <div class="row"><span>TÀI:</span><span class="val" id="tai">--%</span></div>
        <div class="row"><span>XỈU:</span><span class="val" id="xiu">--%</span></div>
      </div>

      <div class="section-label">📊 CHI TIẾT</div>
      <div class="info-box">
        <div class="row"><span>Bit 1:</span><span class="val" id="bit1">--%</span></div>
        <div class="row"><span>Hex≥8:</span><span class="val" id="hex8">--%</span></div>
        <div class="row"><span>StdDev:</span><span class="val" id="std">--</span></div>
        <div class="row"><span>Entropy:</span><span class="val" id="ent">--</span></div>
        <div class="row"><span>Loại:</span><span class="val" id="type">--</span></div>
        <div class="row"><span>Last:</span><span class="val" id="last">--</span></div>
      </div>

      <hr>
      <div class="final-pick" id="finalPick">
        <span class="tai-highlight">TÀI</span>
        <span class="xiu-highlight">XỈU</span>
      </div>
    </div>
  </div>

  <script>
    // ========== MD5 ANALYZER ==========
    class MD5Analyzer {
      sha224(h) {
        let r = '';
        for (let i = 0; i < 56; i++) r += ((h.charCodeAt(i % h.length) * (i + 1) + 7) % 16).toString(16);
        return r;
      }
      entropy(h) {
        const f = {};
        for (let c of h) f[c] = (f[c] || 0) + 1;
        let e = 0;
        for (let k in f) { const p = f[k] / h.length; e -= p * Math.log2(p); }
        return Math.round(e * 1e4) / 1e4;
      }
      geoMean(a) { return Math.pow(a.reduce((x, y) => x * y, 1), 1 / a.length); }
      bit1Ratio(h) {
        try {
          const b = BigInt('0x' + h).toString(2).padStart(128, '0').slice(0, 128);
          return (b.match(/1/g) || []).length / b.length;
        } catch (e) { return 0; }
      }
      hex8Ratio(h) { return [...h].filter(c => parseInt(c, 16) >= 8).length / h.length; }
      stdDev(a) {
        const m = a.reduce((x, y) => x + y, 0) / a.length;
        return Math.sqrt(a.reduce((s, x) => s + (x - m) ** 2, 0) / a.length);
      }
      fibMod(x, m) { let a = 0, b = 1; for (let i = 2; i <= x; i++) [a, b] = [b, a + b]; return b % m; }

      analyze(h) {
        h = h.toLowerCase().trim();
        if (!/^[0-9a-f]{32,64}$/.test(h)) return null;

        const p = [];
        for (let i = 0; i < h.length; i += 2) p.push(parseInt(h.substr(i, 2), 16));
        const dS = [...h].reduce((s, c) => s + parseInt(c, 16), 0);
        const hS = p.reduce((a, b) => a + b, 0);
        const bO = BigInt('0x' + h).toString(2).replace(/0/g, '').length;
        const b1 = this.bit1Ratio(h);
        const h8 = this.hex8Ratio(h);
        let xV = 0; p.forEach(v => xV ^= v);
        const lu = [2, 1]; for (let i = 2; i < 15; i++) lu.push(lu[i - 1] + lu[i - 2]);
        const lim = Math.min(p.length, 15);
        let lw = 0; for (let i = 0; i < lim; i++) lw += p[i] * lu[i];
        const std = this.stdDev(p);
        const comp = new Set(h).size;
        let fo = 0; for (let i = 1; i < p.length; i++) fo += Math.abs(p[i] - p[i - 1]);
        const sha = this.sha224(h);
        const sP = []; for (let i = 0; i < sha.length; i += 2) sP.push(parseInt(sha.substr(i, 2), 16));
        const sS = sP.reduce((a, b) => a + b, 0);
        const hl = Math.floor(h.length / 2);
        let sym = 0; for (let i = 0; i < hl; i++) if (h[i] === h[hl + i]) sym++;
        const geo = this.geoMean(p);
        const cX = xV ^ parseInt(sha.slice(0, 2), 16);
        const fib = this.fibMod(dS, 100);
        let bX = 0; for (let i = 0; i < sha.length; i += 2) bX ^= parseInt(sha.substr(i, 2), 16);
        const wE = (p[0] * 3 + p[p.length - 1] * 2) % 100;
        const pr = [43, 47, 53, 59, 61, 67];
        const mV = pr.map(pr => hS % pr);
        const maxR = Math.max(...[...h].map(c => h.split(c).length - 1));
        const odd = [...h].filter(c => parseInt(c, 16) % 2).length;
        const sI = Math.floor(p.length / 4), eI = Math.floor(3 * p.length / 4);
        const mid = p.slice(sI, eI).reduce((a, b) => a + b, 0);
        const fibH = [...h].filter(c => '12358'.includes(c)).length;
        let shaSym = 0; for (let i = 0; i < 16; i++) if (sha[i] === sha[39 - i]) shaSym++;
        const ent = this.entropy(h);
        const tX = xV ^ bX ^ cX;
        const last = parseInt(h.slice(-1), 16);
        const wf = h.length === 32 ? 1 : 0.8;

        let score = (
          dS * 0.05 + hS * 0.05 + bO * 0.05 + b1 * 0.1 + h8 * 0.1 + lw * 0.05 +
          std * 0.05 + comp * 0.05 + fo * 0.05 + sS * 0.05 + sym * 0.05 + geo * 0.05 +
          cX * 0.05 + fib * 0.05 + bX * 0.05 + wE * 0.05 + mV.reduce((a, b) => a + b, 0) * 0.05 +
          maxR * 0.05 + odd * 0.05 + mid * 0.05 + fibH * 0.05 + shaSym * 0.05 + ent * 0.05 +
          tX * 0.05 + last * 0.05
        ) * wf % 100;

        return {
          tai: Math.round(score * 100) / 100,
          xiu: Math.round((100 - score) * 100) / 100,
          result: score >= 50 ? "TÀI" : "XỈU",
          last, bit1: Math.round(b1 * 10000) / 100,
          hex8: Math.round(h8 * 10000) / 100,
          std: Math.round(std * 100) / 100,
          ent: Math.round(ent * 10000) / 10000,
          type: h.length === 32 ? "MD5" : h.length === 64 ? "SHA-256" : "?"
        };
      }
    }

    const A = new MD5Analyzer();

    // ========== UI ==========
    const tool = document.getElementById('md5Tool');
    const toggleBtn = document.getElementById('toggleBtn');
    const dragBar = document.getElementById('dragBar');
    const toolBody = document.getElementById('toolBody');
    const minBtn = document.getElementById('minBtn');
    const closeBtn = document.getElementById('closeBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const hashInput = document.getElementById('hashInput');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const particlesContainer = document.getElementById('particles');

    // ========== MẶC ĐỊNH TOOL TẮT ==========
    tool.classList.remove('visible');
    toggleBtn.classList.remove('on');

    // Bật/tắt tool
    toggleBtn.addEventListener('click', () => {
      const isVisible = tool.classList.toggle('visible');
      if (isVisible) {
        toggleBtn.classList.add('on');
        toggleBtn.textContent = '✕';
      } else {
        toggleBtn.classList.remove('on');
        toggleBtn.textContent = '⬡';
      }
    });

    closeBtn.addEventListener('click', () => {
      tool.classList.remove('visible');
      toggleBtn.classList.remove('on');
      toggleBtn.textContent = '⬡';
    });

    // Thu gọn nội dung
    minBtn.addEventListener('click', () => {
      toolBody.classList.toggle('hidden-body');
      minBtn.textContent = toolBody.classList.contains('hidden-body') ? '+' : '_';
    });

    // ========== KÉO THẢ MƯỢT MÀ ==========
    let dragging = false, sX, sY, sL, sT;

    function onDragStart(e) {
      if (e.target.tagName === 'BUTTON') return;
      dragging = true;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      sX = clientX;
      sY = clientY;
      const rect = tool.getBoundingClientRect();
      sL = rect.left;
      sT = rect.top;
      tool.style.transition = 'none';
      tool.style.transform = 'none';
      tool.style.left = sL + 'px';
      tool.style.top = sT + 'px';
      dragBar.style.cursor = 'grabbing';
    }

    function onDragMove(e) {
      if (!dragging) return;
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const dx = clientX - sX;
      const dy = clientY - sY;
      tool.style.left = (sL + dx) + 'px';
      tool.style.top = (sT + dy) + 'px';
    }

    function onDragEnd() {
      dragging = false;
      tool.style.transition = 'box-shadow 0.2s, opacity 0.2s';
      dragBar.style.cursor = 'grab';
    }

    dragBar.addEventListener('mousedown', onDragStart);
    dragBar.addEventListener('touchstart', onDragStart, { passive: false });
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('touchmove', onDragMove, { passive: false });
    document.addEventListener('mouseup', onDragEnd);
    document.addEventListener('touchend', onDragEnd);

    // ========== NGĂN ZOOM KHI DÁN HASH ==========
    // Vô hiệu hóa zoom trên toàn trang
    document.addEventListener('gesturestart', (e) => e.preventDefault());
    document.addEventListener('gesturechange', (e) => e.preventDefault());
    document.addEventListener('gestureend', (e) => e.preventDefault());

    // Ngăn double-tap zoom
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) e.preventDefault();
      lastTouchEnd = now;
    }, false);

    // Xử lý paste không làm thay đổi layout
    hashInput.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text');
      const cleanText = text.trim().replace(/\s/g, '');
      hashInput.value = cleanText;
      hashInput.style.height = '26px';
      hashInput.style.maxHeight = '26px';
      // Giữ focus sau khi paste
      hashInput.focus();
    });

    // Giữ kích thước input ổn định
    hashInput.addEventListener('input', () => {
      hashInput.style.height = '26px';
      hashInput.style.maxHeight = '26px';
    });

    hashInput.addEventListener('focus', () => {
      hashInput.style.height = '26px';
      hashInput.style.maxHeight = '26px';
    });

    // ========== HIỆU ỨNG PARTICLES ==========
    function spawnParticles() {
      const chars = ['0', '1', '●', '◆', '⬡', 'T', 'X'];
      for (let i = 0; i < 8; i++) {
        const particle = document.createElement('span');
        particle.className = 'particle';
        particle.textContent = chars[Math.floor(Math.random() * chars.length)];
        particle.style.left = (40 + Math.random() * 20) + '%';
        particle.style.top = (45 + Math.random() * 10) + '%';
        particle.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
        particle.style.animationDelay = (Math.random() * 0.4) + 's';
        particlesContainer.appendChild(particle);
        setTimeout(() => particle.remove(), 1500);
      }
    }

    // ========== FAKE LOADING 1.5-2.9s ==========
    function fakeLoading(callback) {
      const duration = 1500 + Math.random() * 1400; // 1.5s - 2.9s
      const startTime = Date.now();

      analyzeBtn.classList.add('loading');
      progressWrap.classList.add('active');
      progressBar.style.width = '0%';
      spawnParticles();

      function updateProgress() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min((elapsed / duration) * 100, 100);
        progressBar.style.width = progress + '%';

        if (elapsed < duration) {
          requestAnimationFrame(updateProgress);
        } else {
          // Hoàn thành
          progressBar.style.width = '100%';
          setTimeout(() => {
            analyzeBtn.classList.remove('loading');
            progressWrap.classList.remove('active');
            progressBar.style.width = '0%';
            callback();
          }, 150);
        }
      }

      requestAnimationFrame(updateProgress);
    }

    // ========== PHÂN TÍCH ==========
    function runAnalysis() {
      const h = hashInput.value.trim();
      if (!h) return;

      fakeLoading(() => {
        const r = A.analyze(h);
        if (!r) {
          document.getElementById('badge').textContent = 'LỖI';
          return;
        }

        // Cập nhật UI với animation nhẹ
        document.getElementById('badge').innerHTML = r.result === 'TÀI'
          ? '<span class="badge badge-tai">TÀI</span>'
          : '<span class="badge badge-xiu">XỈU</span>';

        document.getElementById('tai').textContent = r.tai + '%';
        document.getElementById('xiu').textContent = r.xiu + '%';
        document.getElementById('bit1').textContent = r.bit1 + '%';
        document.getElementById('hex8').textContent = r.hex8 + '%';
        document.getElementById('std').textContent = r.std;
        document.getElementById('ent').textContent = r.ent;
        document.getElementById('type').textContent = r.type;
        document.getElementById('last').textContent = r.last;

        const fp = document.getElementById('finalPick');
        fp.innerHTML = r.result === 'TÀI'
          ? '<span class="tai-highlight" style="font-size:0.6rem;">⬤ TÀI THẮNG</span><span class="dim">XỈU</span>'
          : '<span class="dim">TÀI</span><span class="xiu-highlight" style="font-size:0.6rem;">⬤ XỈU THẮNG</span>';

        spawnParticles();
      });
    }

    analyzeBtn.addEventListener('click', runAnalysis);

    hashInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        runAnalysis();
      }
    });

    // ========== KHÔNG TỰ ĐỘNG PHÂN TÍCH KHI LOAD ==========
    // (Để user tự bấm)
  </script>
</body>
</html>
