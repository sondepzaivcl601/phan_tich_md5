<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎲 TÀI XỈU MD5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            background: #0a0a0f;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        /* === IFRAME GAME === */
        #gameFrame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 0;
            background: #000;
        }
        
        /* === CON BOT === */
        #bot {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 92%;
            max-width: 420px;
            background: rgba(10, 10, 20, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(128, 0, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            transition: all 0.3s ease;
            padding: 12px 14px 14px;
        }
        
        #bot.collapsed {
            transform: translateX(-50%) translateY(calc(100% - 40px));
            opacity: 0.6;
        }
        
        #bot.collapsed .bot-body {
            display: none;
        }
        
        /* === HEADER === */
        .bot-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        
        .bot-header:active {
            cursor: grabbing;
        }
        
        .bot-avatar {
            font-size: 22px;
            flex-shrink: 0;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        .bot-info {
            flex: 1;
            min-width: 0;
        }
        
        .bot-info .name {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
        }
        
        .bot-info .name .badge {
            font-size: 7px;
            background: linear-gradient(135deg, #ff2d55, #af52de);
            padding: 1px 8px;
            border-radius: 30px;
            margin-left: 4px;
            font-weight: 600;
            display: inline-block;
            vertical-align: middle;
            color: #fff;
        }
        
        .bot-info .status-text {
            font-size: 9px;
            color: rgba(255,255,255,0.2);
            margin-top: 1px;
            transition: 0.3s;
        }
        
        .bot-info .status-text.online { color: #30d158; }
        .bot-info .status-text.offline { color: #ff453a; }
        .bot-info .status-text.loading { color: #5ac8fa; }
        
        .bot-actions {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }
        
        .bot-actions button {
            background: rgba(255,255,255,0.04);
            border: none;
            color: rgba(255,255,255,0.15);
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1;
        }
        
        .bot-actions button:active {
            background: rgba(255,45,85,0.1);
            transform: scale(0.88);
        }
        
        /* === BODY === */
        .bot-body {
            margin-top: 8px;
            animation: fadeUp 0.25s ease;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Row game */
        .row-game {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }
        
        .row-game input {
            flex: 1;
            padding: 7px 12px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 11px;
            font-family: monospace;
            outline: none;
            min-width: 0;
        }
        
        .row-game input::placeholder {
            color: rgba(255,255,255,0.1);
            font-family: system-ui;
            font-size: 10px;
        }
        
        .row-game input:focus {
            border-color: rgba(128, 0, 255, 0.2);
        }
        
        .btn-go {
            padding: 7px 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #30d158, #34c759);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        
        .btn-go:active {
            transform: scale(0.94);
        }
        
        /* Row MD5 */
        .row-md5 {
            display: flex;
            gap: 5px;
            margin-bottom: 4px;
        }
        
        .row-md5 input {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 11px;
            font-family: monospace;
            outline: none;
            min-width: 0;
        }
        
        .row-md5 input::placeholder {
            color: rgba(255,255,255,0.08);
            font-family: system-ui;
            font-size: 10px;
        }
        
        .row-md5 input:focus {
            border-color: rgba(128, 0, 255, 0.2);
        }
        
        .btn-paste {
            padding: 7px 9px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.2);
            font-size: 13px;
            cursor: pointer;
            min-width: 32px;
            transition: 0.2s;
        }
        
        .btn-paste:active {
            background: rgba(128,0,255,0.08);
        }
        
        .btn-analyze {
            padding: 7px 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff2d55, #af52de);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        
        .btn-analyze:active {
            transform: scale(0.94);
        }
        
        .btn-analyze:disabled {
            opacity: 0.3;
            transform: none;
        }
        
        /* === RESULT BOX (GỌN NHƯ ẢNH) === */
        .result-box {
            margin-top: 8px;
            padding: 10px 12px 8px;
            border-radius: 14px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.03);
            display: none;
        }
        
        .result-box.show {
            display: block;
            animation: fadeUp 0.3s ease;
        }
        
        .result-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        
        .result-main .pred {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1px;
            min-width: 60px;
        }
        
        .result-main .pred.tai { color: #30d158; }
        .result-main .pred.xiu { color: #ff453a; }
        
        .result-main .bars {
            flex: 1;
            display: flex;
            gap: 10px;
        }
        
        .result-main .bar-item {
            flex: 1;
            text-align: center;
        }
        
        .result-main .bar-item .lbl {
            font-size: 7px;
            color: rgba(255,255,255,0.15);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .result-main .bar-item .track {
            height: 3px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            overflow: hidden;
            margin-top: 2px;
        }
        
        .result-main .bar-item .track .fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s ease;
        }
        
        .result-main .bar-item .track .fill.tai-fill { background: #30d158; }
        .result-main .bar-item .track .fill.xiu-fill { background: #ff453a; }
        
        .result-main .bar-item .pct {
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            margin-top: 1px;
        }
        
        .result-footer {
            display: flex;
            justify-content: space-around;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid rgba(255,255,255,0.03);
            font-size: 8px;
            color: rgba(255,255,255,0.15);
        }
        
        .result-footer strong {
            color: rgba(255,255,255,0.35);
            font-weight: 600;
        }
        
        /* === NÚT TOGGLE === */
        #botToggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ff2d55, #af52de);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(128,0,255,0.15);
            transition: 0.3s;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        #botToggle:active {
            transform: scale(0.88);
        }
        
        #botToggle.show {
            display: flex;
        }
        
        /* === BOT LOADING GIẢ === */
        .bot-loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 4px 0;
            font-size: 9px;
            color: rgba(255,255,255,0.15);
        }
        
        .bot-loading.show {
            display: flex;
        }
        
        .bot-loading .spinner-mini {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.04);
            border-top: 2px solid #af52de;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* === RESPONSIVE === */
        @media (orientation: landscape) {
            #bot {
                max-width: 380px;
                bottom: 15px;
                padding: 10px 12px 12px;
            }
            .bot-avatar { font-size: 18px; }
            .bot-info .name { font-size: 11px; }
            .result-main .pred { font-size: 18px; min-width: 50px; }
            .result-main .bar-item .pct { font-size: 10px; }
        }
        
        @media (max-width: 480px) {
            #bot {
                width: 96%;
                padding: 10px 12px 12px;
            }
            .result-main .pred { font-size: 18px; min-width: 50px; }
        }
        
        /* === WATERMARK === */
        .watermark {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            font-size: 8px;
            color: rgba(255,255,255,0.03);
            letter-spacing: 1px;
            pointer-events: none;
            text-align: center;
        }
        .watermark span {
            color: rgba(255,45,85,0.05);
        }
    </style>
</head>
<body>

    <!-- ===== IFRAME GAME ===== -->
    <iframe id="gameFrame" src="about:blank"></iframe>

    <!-- ===== CON BOT ===== -->
    <div id="bot">
        <div class="bot-header" id="botHeader">
            <span class="bot-avatar">🤖</span>
            <div class="bot-info">
                <div class="name">
                    TÀI XỈU MD5
                    <span class="badge">@tpmodz</span>
                </div>
                <div class="status-text online" id="botStatusText">💚 Sẵn sàng</div>
            </div>
            <div class="bot-actions">
                <button id="collapseBtn" title="Thu gọn">⌄</button>
                <button id="closeBtn" title="Ẩn bot">✕</button>
            </div>
        </div>

        <div class="bot-body" id="botBody">
            <div class="row-game">
                <input type="text" id="gameUrlInput" placeholder="🔗 Link game (VD: play.max789.vin)">
                <button class="btn-go" id="goBtn">🚀 VÀO</button>
            </div>

            <div class="row-md5" id="md5Row">
                <input type="text" id="md5Input" placeholder="🔑 Nhập MD5 32 ký tự">
                <button class="btn-paste" id="pasteBtn">📋</button>
                <button class="btn-analyze" id="analyzeBtn">🔮 PHÂN TÍCH</button>
            </div>

            <!-- BOT LOADING GIẢ -->
            <div class="bot-loading" id="botLoading">
                <div class="spinner-mini"></div>
                <span id="loadingText">Đang phân tích MD5...</span>
            </div>

            <!-- RESULT -->
            <div class="result-box" id="resultBox">
                <div class="result-main">
                    <div class="pred" id="predText">TÀI</div>
                    <div class="bars">
                        <div class="bar-item">
                            <div class="lbl">TÀI</div>
                            <div class="track"><div class="fill tai-fill" id="taiBar" style="width:0%"></div></div>
                            <div class="pct" id="taiPct">0%</div>
                        </div>
                        <div class="bar-item">
                            <div class="lbl">XỈU</div>
                            <div class="track"><div class="fill xiu-fill" id="xiuBar" style="width:0%"></div></div>
                            <div class="pct" id="xiuPct">0%</div>
                        </div>
                    </div>
                </div>
                <div class="result-footer">
                    <span>Bit 1: <strong id="bits">0%</strong></span>
                    <span>Entropy: <strong id="entropy">0</strong></span>
                    <span>Số cuối: <strong id="lastDigit">0</strong></span>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== NÚT HIỆN BOT ===== -->
    <button id="botToggle">🤖</button>

    <!-- ===== WATERMARK ===== -->
    <div class="watermark">⚡ <span>@tpmodz</span> · DEVILS WILL RISE ⚡</div>

    <script>
        // ============================================================
        // 1. PHÂN TÍCH MD5
        // ============================================================
        function analyzeMD5(hash) {
            hash = hash.toLowerCase().trim();
            if (!/^[a-f0-9]{32}$/.test(hash) && !/^[a-f0-9]{64}$/.test(hash)) {
                return { error: 'MD5 32 hoặc SHA-256 64 ký tự hex' };
            }
            let sum = 0;
            for (let c of hash) sum += parseInt(c, 16);
            let pairs = [];
            for (let i = 0; i < hash.length; i += 2) {
                pairs.push(parseInt(hash.substr(i, 2), 16));
            }
            let pairSum = pairs.reduce((a, b) => a + b, 0);
            let bin = BigInt('0x' + hash).toString(2);
            let ones = (bin.match(/1/g) || []).length;
            let bitRatio = ones / Math.max(bin.length, 128);
            let xor = 0;
            for (let p of pairs) xor ^= p;
            let mean = pairSum / pairs.length;
            let stdDev = Math.sqrt(pairs.reduce((s, v) => s + (v - mean) ** 2, 0) / pairs.length);
            let freq = {};
            for (let c of hash) freq[c] = (freq[c] || 0) + 1;
            let ent = 0;
            for (let c in freq) {
                let p = freq[c] / hash.length;
                ent -= p * Math.log2(p);
            }
            ent = Math.round(ent * 100) / 100;
            let last = parseInt(hash.slice(-1), 16);
            let ge8 = 0;
            for (let c of hash) if (parseInt(c, 16) >= 8) ge8++;
            let ge8Ratio = ge8 / hash.length;
            let score = (
                (sum / hash.length) * 5 +
                (pairSum / hash.length) * 2 +
                bitRatio * 30 +
                (xor % 16) * 1 +
                (stdDev / 16) * 5 +
                ent * 10 +
                last * 3 +
                ge8Ratio * 10
            ) % 100;
            let tai = Math.min(Math.round(score * 0.8 + 10), 95);
            let xiu = 100 - tai;
            let conf = Math.abs(tai - 50);
            let confLevel = 'THẤP';
            if (conf >= 20) confLevel = 'CAO';
            else if (conf >= 10) confLevel = 'TRUNG BÌNH';
            return {
                tai, xiu,
                result: tai >= 50 ? 'TÀI' : 'XỈU',
                lastDigit: last,
                bitRatio: Math.round(bitRatio * 1000) / 10,
                entropy: ent,
                confidence: confLevel
            };
        }

        // ============================================================
        // 2. DOM REFS
        // ============================================================
        const bot = document.getElementById('bot');
        const botHeader = document.getElementById('botHeader');
        const botBody = document.getElementById('botBody');
        const botStatusText = document.getElementById('botStatusText');
        const botLoading = document.getElementById('botLoading');
        const loadingText = document.getElementById('loadingText');
        const collapseBtn = document.getElementById('collapseBtn');
        const closeBtn = document.getElementById('closeBtn');
        const botToggle = document.getElementById('botToggle');
        const gameFrame = document.getElementById('gameFrame');

        const gameUrlInput = document.getElementById('gameUrlInput');
        const goBtn = document.getElementById('goBtn');
        const md5Input = document.getElementById('md5Input');
        const pasteBtn = document.getElementById('pasteBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');

        const resultBox = document.getElementById('resultBox');
        const predText = document.getElementById('predText');
        const taiBar = document.getElementById('taiBar');
        const xiuBar = document.getElementById('xiuBar');
        const taiPct = document.getElementById('taiPct');
        const xiuPct = document.getElementById('xiuPct');
        const bits = document.getElementById('bits');
        const entropy = document.getElementById('entropy');
        const lastDigit = document.getElementById('lastDigit');

        let isCollapsed = false;

        // ============================================================
        // 3. UTILITY
        // ============================================================
        function setStatus(text, type) {
            botStatusText.textContent = text;
            botStatusText.className = 'status-text';
            if (type) botStatusText.classList.add(type);
        }

        function showLoading(text) {
            botLoading.classList.add('show');
            loadingText.textContent = text || 'Đang phân tích MD5...';
        }

        function hideLoading() {
            botLoading.classList.remove('show');
        }

        function showResult(r) {
            resultBox.classList.add('show');
            predText.textContent = r.result;
            predText.className = 'pred ' + (r.result === 'TÀI' ? 'tai' : 'xiu');
            taiBar.style.width = r.tai + '%';
            xiuBar.style.width = r.xiu + '%';
            taiPct.textContent = r.tai + '%';
            xiuPct.textContent = r.xiu + '%';
            bits.textContent = r.bitRatio + '%';
            entropy.textContent = r.entropy;
            lastDigit.textContent = r.lastDigit;
        }

        function doPredict() {
            const hash = md5Input.value.trim();
            if (!hash) {
                setStatus('⚠️ Nhập MD5 hoặc SHA-256', 'offline');
                return;
            }
            
            // Hiệu ứng loading
            showLoading('🔮 Đang phân tích...');
            setStatus('⏳ Đang xử lý...', 'loading');
            analyzeBtn.disabled = true;

            // Giả lập load 1.5s cho xịn
            setTimeout(() => {
                const r = analyzeMD5(hash);
                hideLoading();
                if (r.error) {
                    setStatus('❌ ' + r.error, 'offline');
                    analyzeBtn.disabled = false;
                    return;
                }
                showResult(r);
                setStatus('✅ Dự đoán: ' + r.result + ' (' + r.confidence + ')', 'online');
                analyzeBtn.disabled = false;
            }, 1500);
        }

        // ============================================================
        // 4. SỰ KIỆN
        // ============================================================

        // VÀO GAME
        goBtn.addEventListener('click', function() {
            let url = gameUrlInput.value.trim();
            if (!url) {
                setStatus('⚠️ Nhập link game', 'offline');
                return;
            }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            gameFrame.src = url;
            setStatus('🌐 Đã tải game', 'online');
        });

        gameUrlInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') goBtn.click();
        });

        // PHÂN TÍCH
        analyzeBtn.addEventListener('click', doPredict);
        md5Input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doPredict();
        });

        // PASTE
        pasteBtn.addEventListener('click', async function() {
            try {
                const text = await navigator.clipboard.readText();
                if (text && /^[a-fA-F0-9]{32,64}$/.test(text.trim())) {
                    md5Input.value = text.trim();
                    setStatus('📋 Đã dán MD5', 'online');
                    setTimeout(doPredict, 500);
                } else {
                    setStatus('⚠️ Clipboard không có MD5 hợp lệ', 'offline');
                }
            } catch {
                setStatus('⚠️ Không đọc được clipboard', 'offline');
            }
        });

        // COLLAPSE
        collapseBtn.addEventListener('click', function() {
            isCollapsed = !isCollapsed;
            bot.classList.toggle('collapsed');
            this.textContent = isCollapsed ? '⌃' : '⌄';
        });

        // CLOSE
        closeBtn.addEventListener('click', function() {
            bot.style.display = 'none';
            botToggle.classList.add('show');
        });

        // TOGGLE HIỆN BOT
        botToggle.addEventListener('click', function() {
            bot.style.display = 'block';
            botToggle.classList.remove('show');
            if (isCollapsed) {
                isCollapsed = false;
                bot.classList.remove('collapsed');
                collapseBtn.textContent = '⌄';
            }
        });

        // Click vào bot khi collapsed để mở
        bot.addEventListener('click', function(e) {
            if (isCollapsed && !e.target.closest('button')) {
                isCollapsed = false;
                bot.classList.remove('collapsed');
                collapseBtn.textContent = '⌄';
            }
        });

        // ============================================================
        // 5. KÉO THẢ BOT - TỐI ƯU CHO CẢ LANDSCAPE
        // ============================================================
        let isDragging = false;
        let dragOffX = 0, dragOffY = 0;
        let dragStartX = 0, dragStartY = 0;

        botHeader.addEventListener('mousedown', function(e) {
            if (e.target.closest('button')) return;
            isDragging = true;
            const rect = bot.getBoundingClientRect();
            dragOffX = e.clientX - rect.left;
            dragOffY = e.clientY - rect.top;
            dragStartX = rect.left;
            dragStartY = rect.top;
            bot.style.left = rect.left + 'px';
            bot.style.top = rect.top + 'px';
            bot.style.right = 'auto';
            bot.style.bottom = 'auto';
            bot.style.transform = 'none';
            bot.style.cursor = 'grabbing';
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            let x = e.clientX - dragOffX;
            let y = e.clientY - dragOffY;
            const maxX = window.innerWidth - bot.offsetWidth - 10;
            const maxY = window.innerHeight - bot.offsetHeight - 10;
            x = Math.max(10, Math.min(x, maxX));
            y = Math.max(10, Math.min(y, maxY));
            bot.style.left = x + 'px';
            bot.style.top = y + 'px';
            bot.style.transform = 'none';
        });

        document.addEventListener('mouseup', function() {
            if (isDragging) {
                isDragging = false;
                bot.style.cursor = 'default';
            }
        });

        // Touch events
        let touchId = null;
        botHeader.addEventListener('touchstart', function(e) {
            if (e.target.closest('button')) return;
            const touch = e.touches[0];
            touchId = touch.identifier;
            const rect = bot.getBoundingClientRect();
            dragOffX = touch.clientX - rect.left;
            dragOffY = touch.clientY - rect.top;
            bot.style.left = rect.left + 'px';
            bot.style.top = rect.top + 'px';
            bot.style.right = 'auto';
            bot.style.bottom = 'auto';
            bot.style.transform = 'none';
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', function(e) {
            let touch = null;
            for (let t of e.touches) {
                if (t.identifier === touchId) { touch = t; break; }
            }
            if (!touch) return;
            let x = touch.clientX - dragOffX;
            let y = touch.clientY - dragOffY;
            const maxX = window.innerWidth - bot.offsetWidth - 10;
            const maxY = window.innerHeight - bot.offsetHeight - 10;
            x = Math.max(10, Math.min(x, maxX));
            y = Math.max(10, Math.min(y, maxY));
            bot.style.left = x + 'px';
            bot.style.top = y + 'px';
            bot.style.transform = 'none';
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchend', function() {
            touchId = null;
        });

        // ============================================================
        // 6. XỬ LÝ XOAY MÀN HÌNH - KHÔNG BỊ ẨN
        // ============================================================
        function handleOrientationChange() {
            // Đảm bảo bot không bị trôi ra ngoài
            const rect = bot.getBoundingClientRect();
            const maxX = window.innerWidth - bot.offsetWidth - 10;
            const maxY = window.innerHeight - bot.offsetHeight - 10;
            
            if (rect.left > maxX || rect.top > maxY || rect.left < 0 || rect.top < 0) {
                // Nếu bot bị trôi, đưa về vị trí an toàn
                bot.style.left = Math.min(Math.max(rect.left, 10), maxX) + 'px';
                bot.style.top = Math.min(Math.max(rect.top, 10), maxY) + 'px';
                bot.style.transform = 'none';
            }
            
            // Điều chỉnh kích thước font cho landscape
            if (window.innerWidth > window.innerHeight) {
                // Landscape
                document.documentElement.style.fontSize = '14px';
            } else {
                // Portrait
                document.documentElement.style.fontSize = '16px';
            }
        }

        // Lắng nghe sự kiện xoay màn hình
        window.addEventListener('orientationchange', function() {
            setTimeout(handleOrientationChange, 300);
        });

        window.addEventListener('resize', function() {
            setTimeout(handleOrientationChange, 200);
        });

        // ============================================================
        // 7. KHỞI TẠO
        // ============================================================
        setStatus('💡 Nhập link game → VÀO → nhập MD5 → PHÂN TÍCH', 'online');
        handleOrientationChange();
        
        console.log('🤖 MD5 BOT v5.0 - @tpmodz');
        console.log('💀 DEVILS WILL RISE');
    </script>
