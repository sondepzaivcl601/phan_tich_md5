<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🤖 MD5 BOT - TÀI XỈU</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }
        /* ===== IFRAME GAME ===== */
        #gameFrame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 0;
            background: #000;
        }
        /* ===== LOADING GAME ===== */
        #gameLoading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.2);
            font-size: 14px;
            transition: opacity 0.6s;
            pointer-events: none;
        }
        #gameLoading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.04);
            border-top: 3px solid #af52de;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #gameLoading.hide {
            opacity: 0;
        }
        /* ===== CON BOT ===== */
        #bot {
            position: fixed;
            z-index: 999;
            bottom: 30px;
            right: 30px;
            width: 400px;
            max-width: 92vw;
            background: rgba(12, 12, 28, 0.94);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px 28px 18px 18px;
            border: 1px solid rgba(128, 0, 255, 0.12);
            box-shadow: 0 12px 50px rgba(0,0,0,0.8), 0 0 60px rgba(128,0,255,0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: bottom right;
        }
        #bot.collapsed {
            transform: scale(0.85);
            opacity: 0.7;
            cursor: pointer;
        }
        #bot.collapsed .bot-body {
            display: none;
        }
        #bot.collapsed .bot-status-text {
            display: none;
        }
        /* ===== HEADER BOT ===== */
        .bot-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px 10px 16px;
            cursor: grab;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .bot-header:active {
            cursor: grabbing;
        }
        .bot-avatar {
            font-size: 28px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 12px rgba(128,0,255,0.15));
            flex-shrink: 0;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-4px) rotate(4deg); }
        }
        .bot-info {
            flex: 1;
            min-width: 0;
        }
        .bot-info .name {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
        }
        .bot-info .name .badge {
            font-size: 8px;
            background: linear-gradient(135deg, #ff2d55, #af52de);
            padding: 1px 10px;
            border-radius: 30px;
            margin-left: 4px;
            font-weight: 600;
            display: inline-block;
            vertical-align: middle;
            color: #fff;
        }
        .bot-info .status-text {
            font-size: 10px;
            color: rgba(255,255,255,0.25);
            margin-top: 1px;
            transition: 0.3s;
        }
        .bot-info .status-text.online { color: #30d158; }
        .bot-info .status-text.offline { color: #ff453a; }
        .bot-info .status-text.loading { color: #5ac8fa; }
        .bot-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .bot-actions button {
            background: rgba(255,255,255,0.04);
            border: none;
            color: rgba(255,255,255,0.2);
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1;
        }
        .bot-actions button:active {
            background: rgba(255,45,85,0.12);
            transform: scale(0.88);
        }
        /* ===== BODY BOT ===== */
        .bot-body {
            padding: 12px 16px 16px 16px;
            animation: fadeUp 0.25s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Row game */
        .row-game {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .row-game input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 12px;
            font-family: monospace;
            outline: none;
            min-width: 0;
        }
        .row-game input::placeholder {
            color: rgba(255,255,255,0.12);
            font-family: system-ui;
            font-size: 11px;
        }
        .row-game input:focus {
            border-color: rgba(128, 0, 255, 0.2);
        }
        .btn-go {
            padding: 8px 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #30d158, #34c759);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn-go:active {
            transform: scale(0.94);
        }
        /* Row MD5 */
        .row-md5 {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }
        .row-md5 input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 11px;
            font-family: monospace;
            outline: none;
            min-width: 0;
        }
        .row-md5 input::placeholder {
            color: rgba(255,255,255,0.1);
            font-family: system-ui;
            font-size: 10px;
        }
        .row-md5 input:focus {
            border-color: rgba(128, 0, 255, 0.2);
        }
        .btn-paste {
            padding: 8px 10px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.25);
            font-size: 14px;
            cursor: pointer;
            min-width: 36px;
            transition: 0.2s;
        }
        .btn-paste:active {
            background: rgba(128,0,255,0.08);
        }
        .btn-analyze {
            padding: 8px 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff2d55, #af52de);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn-analyze:active {
            transform: scale(0.94);
        }
        .btn-analyze:disabled {
            opacity: 0.3;
            transform: none;
        }
        /* Row toggle */
        .row-toggle {
            display: flex;
            justify-content: flex-end;
            margin-top: 4px;
            gap: 8px;
        }
        .btn-toggle-analyze {
            padding: 4px 14px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 30px;
            background: transparent;
            color: rgba(255,255,255,0.2);
            font-size: 9px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-toggle-analyze:active {
            transform: scale(0.92);
        }
        .btn-toggle-analyze.active {
            background: rgba(255,45,85,0.1);
            color: #ff2d55;
            border-color: rgba(255,45,85,0.2);
        }
        /* ===== RESULT BOX ===== */
        .result-box {
            margin-top: 10px;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            display: none;
            animation: fadeUp 0.3s ease;
        }
        .result-box.show {
            display: block;
        }
        .result-box .pred {
            text-align: center;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 0.5px;
            padding: 2px 0;
        }
        .result-box .pred.tai { color: #30d158; }
        .result-box .pred.xiu { color: #ff453a; }
        .result-box .bars {
            display: flex;
            gap: 14px;
            margin-top: 8px;
        }
        .result-box .bar-item {
            flex: 1;
            text-align: center;
        }
        .result-box .bar-item .lbl {
            font-size: 8px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-box .bar-item .track {
            height: 4px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            overflow: hidden;
            margin-top: 2px;
        }
        .result-box .bar-item .track .fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s ease;
        }
        .result-box .bar-item .track .fill.tai-fill { background: #30d158; }
        .result-box .bar-item .track .fill.xiu-fill { background: #ff453a; }
        .result-box .bar-item .pct {
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            margin-top: 2px;
        }
        .result-box .mini-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.04);
            font-size: 9px;
            color: rgba(255,255,255,0.2);
        }
        .result-box .mini-stats strong {
            color: rgba(255,255,255,0.45);
            font-weight: 600;
        }
        /* ===== NÚT TOGGLE BOT ===== */
        #botToggle {
            position: fixed;
            z-index: 1000;
            bottom: 30px;
            right: 30px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ff2d55, #af52de);
            color: #fff;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 6px 30px rgba(128,0,255,0.2);
            transition: 0.3s;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #botToggle:active {
            transform: scale(0.88);
        }
        #botToggle.show {
            display: flex;
        }
        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            #bot {
                width: 100%;
                max-width: 100%;
                bottom: 0;
                right: 0;
                border-radius: 20px 20px 0 0;
                max-height: 80vh;
                overflow-y: auto;
            }
            .bot-header {
                padding: 10px 14px 8px 14px;
            }
            .bot-body {
                padding: 8px 14px 14px 14px;
            }
            .row-game input, .row-md5 input {
                font-size: 11px;
                padding: 6px 10px;
            }
            .btn-go, .btn-analyze {
                font-size: 11px;
                padding: 6px 12px;
            }
            #botToggle {
                width: 44px;
                height: 44px;
                font-size: 22px;
                bottom: 16px;
                right: 16px;
            }
        }
        /* ===== FOOTER WATERMARK ===== */
        .watermark {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 998;
            font-size: 9px;
            color: rgba(255,255,255,0.04);
            letter-spacing: 1px;
            pointer-events: none;
            text-align: center;
        }
        .watermark span {
            color: rgba(255,45,85,0.08);
        }
    </style>
</head>
<body>

    <!-- ===== LOADING ===== -->
    <div id="gameLoading">
        <div class="spinner"></div>
        <div>🔄 Đang tải game...</div>
    </div>

    <!-- ===== IFRAME GAME ===== -->
    <iframe id="gameFrame" src="about:blank"></iframe>

    <!-- ===== CON BOT ===== -->
    <div id="bot">
        <div class="bot-header" id="botHeader">
            <span class="bot-avatar">🤖</span>
            <div class="bot-info">
                <div class="name">
                    MD5 BOT
                    <span class="badge">@tpmodz</span>
                </div>
                <div class="status-text online" id="botStatusText">💚 Sẵn sàng</div>
            </div>
            <div class="bot-actions">
                <button id="collapseBtn" title="Thu gọn">⌄</button>
                <button id="closeBtn" title="Ẩn bot">✕</button>
            </div>
        </div>

        <div class="bot-body" id="botBody">
            <div class="row-game">
                <input type="text" id="gameUrlInput" placeholder="🔗 Nhập link game (VD: play.max789.vin)">
                <button class="btn-go" id="goBtn">🚀 VÀO</button>
            </div>

            <div class="row-md5" id="md5Row" style="display:none;">
                <input type="text" id="md5Input" placeholder="🔑 Nhập MD5 32 ký tự">
                <button class="btn-paste" id="pasteBtn">📋</button>
                <button class="btn-analyze" id="analyzeBtn">🔮 PHÂN TÍCH</button>
            </div>

            <div class="row-toggle">
                <button class="btn-toggle-analyze" id="toggleAnalyzeBtn">🔇 TẮT PHÂN TÍCH</button>
            </div>

            <div class="result-box" id="resultBox">
                <div class="pred" id="predText">TÀI</div>
                <div class="bars">
                    <div class="bar-item">
                        <div class="lbl">TÀI</div>
                        <div class="track"><div class="fill tai-fill" id="taiBar" style="width:0%"></div></div>
                        <div class="pct" id="taiPct">0%</div>
                    </div>
                    <div class="bar-item">
                        <div class="lbl">XỈU</div>
                        <div class="track"><div class="fill xiu-fill" id="xiuBar" style="width:0%"></div></div>
                        <div class="pct" id="xiuPct">0%</div>
                    </div>
                </div>
                <div class="mini-stats">
                    <span>Bit 1: <strong id="bits">0%</strong></span>
                    <span>Entropy: <strong id="entropy">0</strong></span>
                    <span>Số cuối: <strong id="lastDigit">0</strong></span>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== NÚT HIỆN BOT ===== -->
    <button id="botToggle">🤖</button>

    <!-- ===== WATERMARK ===== -->
    <div class="watermark">⚡ <span>@tpmodz</span> · DEVILS WILL RISE ⚡</div>

    <script>
        // ============================================================
        // 1. PHÂN TÍCH MD5
        // ============================================================
        function analyzeMD5(hash) {
            hash = hash.toLowerCase().trim();
            if (!/^[a-f0-9]{32}$/.test(hash) && !/^[a-f0-9]{64}$/.test(hash)) {
                return { error: 'MD5 32 hoặc SHA-256 64 ký tự hex' };
            }
            let sum = 0;
            for (let c of hash) sum += parseInt(c, 16);
            let pairs = [];
            for (let i = 0; i < hash.length; i += 2) {
                pairs.push(parseInt(hash.substr(i, 2), 16));
            }
            let pairSum = pairs.reduce((a, b) => a + b, 0);
            let bin = BigInt('0x' + hash).toString(2);
            let ones = (bin.match(/1/g) || []).length;
            let bitRatio = ones / Math.max(bin.length, 128);
            let xor = 0;
            for (let p of pairs) xor ^= p;
            let mean = pairSum / pairs.length;
            let stdDev = Math.sqrt(pairs.reduce((s, v) => s + (v - mean) ** 2, 0) / pairs.length);
            let freq = {};
            for (let c of hash) freq[c] = (freq[c] || 0) + 1;
            let ent = 0;
            for (let c in freq) {
                let p = freq[c] / hash.length;
                ent -= p * Math.log2(p);
            }
            ent = Math.round(ent * 100) / 100;
            let last = parseInt(hash.slice(-1), 16);
            let ge8 = 0;
            for (let c of hash) if (parseInt(c, 16) >= 8) ge8++;
            let ge8Ratio = ge8 / hash.length;
            let score = (
                (sum / hash.length) * 5 +
                (pairSum / hash.length) * 2 +
                bitRatio * 30 +
                (xor % 16) * 1 +
                (stdDev / 16) * 5 +
                ent * 10 +
                last * 3 +
                ge8Ratio * 10
            ) % 100;
            let tai = Math.min(Math.round(score * 0.8 + 10), 95);
            let xiu = 100 - tai;
            let conf = Math.abs(tai - 50);
            let confLevel = 'THẤP';
            if (conf >= 20) confLevel = 'CAO';
            else if (conf >= 10) confLevel = 'TRUNG BÌNH';
            return {
                tai, xiu,
                result: tai >= 50 ? 'TÀI' : 'XỈU',
                lastDigit: last,
                bitRatio: Math.round(bitRatio * 1000) / 10,
                entropy: ent,
                confidence: confLevel
            };
        }

        // ============================================================
        // 2. DOM REFS
        // ============================================================
        const bot = document.getElementById('bot');
        const botHeader = document.getElementById('botHeader');
        const botBody = document.getElementById('botBody');
        const botStatusText = document.getElementById('botStatusText');
        const collapseBtn = document.getElementById('collapseBtn');
        const closeBtn = document.getElementById('closeBtn');
        const botToggle = document.getElementById('botToggle');
        const gameFrame = document.getElementById('gameFrame');
        const gameLoading = document.getElementById('gameLoading');

        const gameUrlInput = document.getElementById('gameUrlInput');
        const goBtn = document.getElementById('goBtn');
        const md5Row = document.getElementById('md5Row');
        const md5Input = document.getElementById('md5Input');
        const pasteBtn = document.getElementById('pasteBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const toggleAnalyzeBtn = document.getElementById('toggleAnalyzeBtn');

        const resultBox = document.getElementById('resultBox');
        const predText = document.getElementById('predText');
        const taiBar = document.getElementById('taiBar');
        const xiuBar = document.getElementById('xiuBar');
        const taiPct = document.getElementById('taiPct');
        const xiuPct = document.getElementById('xiuPct');
        const bits = document.getElementById('bits');
        const entropy = document.getElementById('entropy');
        const lastDigit = document.getElementById('lastDigit');

        let analyzeEnabled = true;
        let isCollapsed = false;

        // ============================================================
        // 3. UTILITY
        // ============================================================
        function setStatus(text, type) {
            botStatusText.textContent = text;
            botStatusText.className = 'status-text';
            if (type) botStatusText.classList.add(type);
        }

        function showResult(r) {
            resultBox.classList.add('show');
            predText.textContent = r.result;
            predText.className = 'pred ' + (r.result === 'TÀI' ? 'tai' : 'xiu');
            taiBar.style.width = r.tai + '%';
            xiuBar.style.width = r.xiu + '%';
            taiPct.textContent = r.tai + '%';
            xiuPct.textContent = r.xiu + '%';
            bits.textContent = r.bitRatio + '%';
            entropy.textContent = r.entropy;
            lastDigit.textContent = r.lastDigit;
        }

        function doPredict() {
            if (!analyzeEnabled) {
                setStatus('🔇 Phân tích đã tắt', 'offline');
                return;
            }
            const hash = md5Input.value.trim();
            if (!hash) {
                setStatus('⚠️ Nhập MD5 hoặc SHA-256', 'offline');
                return;
            }
            setStatus('⏳ Đang phân tích...', 'loading');
            analyzeBtn.disabled = true;

            setTimeout(() => {
                const r = analyzeMD5(hash);
                if (r.error) {
                    setStatus('❌ ' + r.error, 'offline');
                    analyzeBtn.disabled = false;
                    return;
                }
                showResult(r);
                setStatus('✅ Dự đoán: ' + r.result + ' (' + r.confidence + ')', 'online');
                analyzeBtn.disabled = false;
            }, 300);
        }

        // ============================================================
        // 4. SỰ KIỆN
        // ============================================================

        // VÀO GAME
        goBtn.addEventListener('click', function() {
            let url = gameUrlInput.value.trim();
            if (!url) {
                setStatus('⚠️ Nhập link game', 'offline');
                return;
            }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            gameLoading.classList.remove('hide');
            gameFrame.src = url;
            md5Row.style.display = 'flex';
            setStatus('🌐 Đã tải game. Nhập MD5 để phân tích.', 'online');

            // Ẩn loading sau 2s
            setTimeout(() => {
                gameLoading.classList.add('hide');
            }, 2000);
        });

        gameUrlInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') goBtn.click();
        });

        // PHÂN TÍCH
        analyzeBtn.addEventListener('click', doPredict);
        md5Input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doPredict();
        });

        // PASTE
        pasteBtn.addEventListener('click', async function() {
            try {
                const text = await navigator.clipboard.readText();
                if (text && /^[a-fA-F0-9]{32,64}$/.test(text.trim())) {
                    md5Input.value = text.trim();
                    setStatus('📋 Đã dán MD5', 'online');
                    setTimeout(doPredict, 400);
                } else {
                    setStatus('⚠️ Clipboard không có MD5 hợp lệ', 'offline');
                }
            } catch {
                setStatus('⚠️ Không đọc được clipboard', 'offline');
            }
        });

        // BẬT/TẮT PHÂN TÍCH
        toggleAnalyzeBtn.addEventListener('click', function() {
            analyzeEnabled = !analyzeEnabled;
            this.textContent = analyzeEnabled ? '🔇 TẮT PHÂN TÍCH' : '🔊 BẬT PHÂN TÍCH';
            this.classList.toggle('active');
            setStatus(analyzeEnabled ? '✅ Phân tích đã bật' : '🔇 Phân tích đã tắt', analyzeEnabled ? 'online' : 'offline');
            if (!analyzeEnabled) {
                resultBox.classList.remove('show');
            }
        });

        // COLLAPSE
        collapseBtn.addEventListener('click', function() {
            isCollapsed = !isCollapsed;
            bot.classList.toggle('collapsed');
            this.textContent = isCollapsed ? '⌃' : '⌄';
        });

        // CLOSE
        closeBtn.addEventListener('click', function() {
            bot.style.display = 'none';
            botToggle.classList.add('show');
        });

        // TOGGLE HIỆN BOT
        botToggle.addEventListener('click', function() {
            bot.style.display = 'block';
            botToggle.classList.remove('show');
            if (isCollapsed) {
                isCollapsed = false;
                bot.classList.remove('collapsed');
                collapseBtn.textContent = '⌄';
            }
        });

        // Click vào bot khi collapsed để mở
        bot.addEventListener('click', function(e) {
            if (isCollapsed && !e.target.closest('button')) {
                isCollapsed = false;
                bot.classList.remove('collapsed');
                collapseBtn.textContent = '⌄';
            }
        });

        // ============================================================
        // 5. KÉO THẢ BOT
        // ============================================================
        let isDragging = false;
        let dragOffX = 0, dragOffY = 0;

        botHeader.addEventListener('mousedown', function(e) {
            if (e.target.closest('button')) return;
            isDragging = true;
            const rect = bot.getBoundingClientRect();
            dragOffX = e.clientX - rect.left;
            dragOffY = e.clientY - rect.top;
            bot.style.left = rect.left + 'px';
            bot.style.top = rect.top + 'px';
            bot.style.right = 'auto';
            bot.style.bottom = 'auto';
            bot.style.transform = 'none';
            bot.style.cursor = 'grabbing';
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            let x = e.clientX - dragOffX;
            let y = e.clientY - dragOffY;
            x = Math.max(0, Math.min(x, window.innerWidth - bot.offsetWidth));
            y = Math.max(0, Math.min(y, window.innerHeight - bot.offsetHeight));
            bot.style.left = x + 'px';
            bot.style.top = y + 'px';
        });

        document.addEventListener('mouseup', function() {
            if (isDragging) {
                isDragging = false;
                bot.style.cursor = 'default';
            }
        });

        // Touch events
        let touchId = null;
        botHeader.addEventListener('touchstart', function(e) {
            if (e.target.closest('button')) return;
            const touch = e.touches[0];
            touchId = touch.identifier;
            const rect = bot.getBoundingClientRect();
            dragOffX = touch.clientX - rect.left;
            dragOffY = touch.clientY - rect.top;
            bot.style.left = rect.left + 'px';
            bot.style.top = rect.top + 'px';
            bot.style.right = 'auto';
            bot.style.bottom = 'auto';
            bot.style.transform = 'none';
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', function(e) {
            let touch = null;
            for (let t of e.touches) {
                if (t.identifier === touchId) { touch = t; break; }
            }
            if (!touch) return;
            let x = touch.clientX - dragOffX;
            let y = touch.clientY - dragOffY;
            x = Math.max(0, Math.min(x, window.innerWidth - bot.offsetWidth));
            y = Math.max(0, Math.min(y, window.innerHeight - bot.offsetHeight));
            bot.style.left = x + 'px';
            bot.style.top = y + 'px';
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchend', function() {
            touchId = null;
        });

        // ============================================================
        // 6. KHỞI TẠO
        // ============================================================
        setStatus('💡 Nhập link game → VÀO → nhập MD5 → PHÂN TÍCH', 'online');
        console.log('🤖 MD5 BOT - @tpmodz');
        console.log('💀 DEVILS WILL RISE');
    </script>
